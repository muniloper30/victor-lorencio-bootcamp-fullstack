<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ejercicio 1 de consolidación de tablas" />
    <title>Inscripción a un taller técnico</title>
  </head>
  <body>
    <header>
      <h1>FORMULARIO DE INSCRIPCIÓN</h1>
      <p>Rellena todos los campos del formulario antes de enviar</p>
    </header>
    <main>
      <!--Formulario de contacto-->
      <section>
        <form action="/contact" method="post">
          <label for="full_name">Nombre completo</label>
          <input type="text" name="fullName" id="full_name" placeholder="victor loren..." required />
          <p></p>
          <!--Salto de línea-->
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
          <p></p>
          <!--Salto de línea-->
          <label for="phone">Teléfono</label>
          <input
            type="tel"
            name="phone"
            id="phone"
            placeholder="666444555"
            required
          />
          <p></p>
          <!--Salto de línea-->
          <label for="date">Fecha de nacimiento</label>
          <input type="date" name="date" id="date" required />
          <p></p>
          <!--Salto de línea-->
          <label for="notes">Notas extras</label>
          <p></p>
          <!--Salto de línea-->
          <textarea name="notes" id="notes" rows="6" cols="40">
¿Quieres añadir algo extra? escribelo aquí</textarea
          >
          <p></p>
          <!--Salto de línea-->
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
  </body>
</html>
